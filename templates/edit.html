<!DOCTYPE html>
<html>
<head>
    <title>Edit Expense</title>
</head>
<body>

<h1>Edit Transaction</h1>

<form action="/update/{{ expense[0] }}" method="POST">

    <input
        type="text"
        name="title"
        value="{{ expense[1] }}"
        required>

    <input
        type="number"
        name="amount"
        value="{{ expense[2] }}"
        required>

    <select name="type">

        <option value="Income"
        {% if expense[3] == "Income" %}selected{% endif %}>
        Income
        </option>

        <option value="Expense"
        {% if expense[3] == "Expense" %}selected{% endif %}>
        Expense
        </option>

    </select>

    <button type="submit">
        Update
    </button>

</form>

</body>
</html>
